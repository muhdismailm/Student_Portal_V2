<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Portal | Login</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container-fluid login-page p-0">
        <div class="row g-0 min-vh-100">
            <!-- Left Side: Login Form -->
            <div class="col-12 col-lg-6 login-right order-2 order-lg-1 d-flex align-items-center justify-content-center bg-white">
                <div class="login-card w-100" style="max-width: 450px; padding: 2rem;">
                    <!-- Brand Headers -->
                    <div class="d-flex align-items-center gap-3 mb-5">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#15305b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                        </svg>
                        <div>
                            <h1 style="font-size: 1.5rem; color: #15305b; margin: 0; font-weight: 800; letter-spacing: 1px;">ACADEMIA</h1>
                            <p style="font-size: 0.70rem; color: #64748b; margin: 0; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px;">School Management System</p>
                        </div>
                    </div>

                    <div class="login-card-header text-start mb-4">
                        <h2 style="color: #15305b; font-size: 1.5rem; font-weight: 700;">Login to your account</h2>
                    </div>

                    <div class="form-group position-relative mb-4">
                        <div style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); display:flex; align-items:center; opacity: 0.5;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="#15305b" stroke="none"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>
                        </div>
                        <input type="text" id="email" placeholder="Email / Register Number" style="background: #f0f4f8; border: none; padding-left: 3rem; color: #15305b; font-weight: 500;">
                    </div>

                    <div class="form-group position-relative mb-4">
                        <div style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); display:flex; align-items:center; opacity: 0.5;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="#15305b" stroke="none"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z" /></svg>
                        </div>
                        <input type="password" id="password" placeholder="Password / DOB (DDMMYYYY)" style="background: #f0f4f8; border: none; padding-left: 3rem; color: #15305b; font-weight: 500;">
                    </div>

                    <div class="text-start mb-4">
                        <a href="#" style="color: #64748b; font-size: 0.85rem; font-weight: 600; text-decoration: none;">Forget password?</a>
                    </div>

                    <button onclick="login()" class="btn btn-primary px-5" style="background: #15305b; border-radius: 8px; font-weight: 600;">
                        Login
                    </button>
                </div>
            </div>

            <!-- Right Side: Graphic/Hero Image -->
            <div class="col-lg-6 login-left order-1 order-lg-2 d-none d-lg-flex align-items-center justify-content-center position-relative overflow-hidden" style="background: #f4f7fb;">
                <div style="position: absolute; top:0;left:0;right:0;bottom:0; background: url('assets/images/hero_bg.png') center/cover; opacity: 0.15; mix-blend-mode: multiply;"></div>
                <img src="assets/images/login_illustration.png" alt="Hero Illustration" style="max-width: 80%; z-index: 2; object-fit: contain;">
            </div>
        </div>
    </div>

    <!-- Container for dynamic Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Supabase SDK & Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
